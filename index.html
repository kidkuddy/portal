<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sofiene Barka</title>
<meta name="description" content="Point your own AI at the record and ask.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400;1,6..96,500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0b0b0b;
    --paper: #ffffff;
    --hair: rgba(11, 11, 11, 0.18);
    --mute: rgba(11, 11, 11, 0.5);
    --serif: "Bodoni Moda", Didot, "Bodoni MT", "Playfair Display", "Times New Roman", serif;
    --sans: "Helvetica Neue", Arial, "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }
  ::selection { background: var(--ink); color: var(--paper); }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: clamp(40px, 9vh, 96px) 28px 72px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .kicker {
    font-family: var(--sans);
    text-transform: uppercase;
    letter-spacing: 0.34em;
    font-size: 0.62rem;
    font-weight: 500;
    color: var(--mute);
    margin: 0;
  }

  /* ---------- front door ---------- */
  .masthead {
    margin: auto 0;
    text-align: center;
  }
  .masthead .kicker { margin-bottom: clamp(28px, 6vh, 56px); }
  .name {
    font-weight: 500;
    font-style: normal;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    line-height: 0.92;
    font-size: clamp(3rem, 16vw, 8rem);
    margin: 0;
  }
  .rule {
    width: 46px; height: 1px; background: var(--ink);
    margin: clamp(28px, 6vh, 52px) auto;
  }
  .doors {
    display: flex; justify-content: center; align-items: baseline;
    gap: clamp(32px, 9vw, 84px);
  }
  .door {
    font-family: var(--sans);
    background: none; border: none; padding: 6px 2px; margin: 0;
    color: var(--ink); cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.28em;
    font-size: 0.8rem; font-weight: 500;
    position: relative;
  }
  .door::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -3px;
    height: 1px; background: var(--ink);
    transform: scaleX(0); transform-origin: center;
    transition: transform .28s ease;
  }
  .door:hover::after, .door:focus-visible::after { transform: scaleX(1); }
  .door:focus-visible { outline: none; }
  .door.disabled { cursor: default; color: var(--mute); }
  .door.disabled::after { display: none; }
  .door.disabled small {
    display: block; margin-top: 8px;
    letter-spacing: 0.2em; font-size: 0.55rem; font-style: normal;
  }

  /* ---------- light page ---------- */
  .view { display: none; flex: 1; flex-direction: column; }
  .view.active { display: flex; animation: rise .5s cubic-bezier(.2,.6,.2,1); }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: auto; }
  .back {
    font-family: var(--sans); background: none; border: none; padding: 0; margin: 0;
    color: var(--ink); cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.28em; font-size: 0.66rem; font-weight: 500;
  }
  .back:hover { color: var(--mute); }

  .lead { margin: clamp(48px, 12vh, 120px) 0 0; }
  .lead h1 {
    font-weight: 400; font-size: clamp(2.4rem, 7.5vw, 4.6rem);
    line-height: 1.02; letter-spacing: -0.01em; margin: 18px 0 0; max-width: 12ch;
  }
  .lead h1 em { font-style: italic; }

  .index { margin: clamp(40px, 8vh, 72px) 0 0; border-top: 1px solid var(--hair); }
  .pick {
    display: flex; justify-content: space-between; align-items: baseline; gap: 20px;
    width: 100%; text-align: left;
    background: none; border: none; border-bottom: 1px solid var(--hair);
    padding: 22px 4px; margin: 0; cursor: pointer; color: var(--ink);
    transition: padding-left .3s cubic-bezier(.2,.6,.2,1), color .2s ease;
  }
  .pick:hover, .pick:focus-visible { padding-left: 18px; outline: none; }
  .pick .word {
    font-family: var(--sans); text-transform: uppercase;
    letter-spacing: 0.24em; font-size: 0.82rem; font-weight: 500;
    white-space: nowrap;
  }
  .pick .note { font-style: italic; font-size: 1.02rem; color: var(--mute); text-align: right; }
  .pick.copied { color: var(--mute); }
  .pick.copied .word::after {
    content: " ✓"; letter-spacing: 0; color: var(--ink);
  }

  .status {
    font-family: var(--sans); text-transform: uppercase;
    letter-spacing: 0.24em; font-size: 0.62rem; font-weight: 500;
    color: var(--mute); margin: 28px 0 0; min-height: 1em;
    opacity: 0; transition: opacity .3s ease;
  }
  .status.show { opacity: 1; }
  .status strong { color: var(--ink); font-weight: 500; }

  .foot { font-family: var(--sans); letter-spacing: 0.24em; text-transform: uppercase;
    font-size: 0.55rem; color: var(--mute); margin-top: auto; padding-top: 56px; }

  @media (max-width: 540px) {
    .pick { flex-direction: column; align-items: flex-start; gap: 6px; }
    .pick .note { text-align: left; }
  }
</style>
</head>
<body>
<main>
  <!-- front door -->
  <section id="door" class="view active">
    <div class="masthead">
      <p class="kicker">The Record — MMXXVI</p>
      <h1 class="name">Sofiene<br>Barka</h1>
      <div class="rule"></div>
      <div class="doors">
        <button class="door" id="pick-light">Light</button>
        <button class="door disabled" id="pick-cool" aria-disabled="true" tabindex="-1">
          Cool<small>Still cooking</small>
        </button>
      </div>
    </div>
  </section>

  <!-- light page -->
  <section id="light" class="view">
    <div class="top">
      <button class="back" id="back">← Back</button>
      <span class="kicker">Light</span>
    </div>

    <div class="lead">
      <p class="kicker">Ask your own AI</p>
      <h1>What brings you <em>here?</em></h1>
    </div>

    <div class="index" id="index">
      <button class="pick" data-intent="recruiter">
        <span class="word">Recruiter</span>
        <span class="note">screening a candidate</span>
      </button>
      <button class="pick" data-intent="founder">
        <span class="word">Founder</span>
        <span class="note">weighing a collaboration</span>
      </button>
      <button class="pick" data-intent="engineer">
        <span class="word">Engineer</span>
        <span class="note">curious about the work</span>
      </button>
      <button class="pick" data-intent="curious">
        <span class="word">Curious</span>
        <span class="note">just getting to know him</span>
      </button>
    </div>

    <p class="status" id="status">Choose one — the prompt copies itself.</p>

    <p class="foot">Paste it into ChatGPT, Claude, or any AI that browses the web.</p>
  </section>
</main>

<script>
  // Data source stays out of the visible UI — it only ever lives inside the copied prompt.
  var SRC = "https://shouldknowaboutme.vercel.app";

  var OPENERS = {
    recruiter: "I'm a recruiter screening Mohamed Sofiene Barka (\"Sofiene\") as a candidate. I want a grounded read on his experience, strengths, and fit.",
    founder:   "I'm a founder weighing a collaboration with Mohamed Sofiene Barka (\"Sofiene\"). I want to understand how he works, what he's shipped, and whether we'd be a good fit.",
    engineer:  "I'm an engineer curious about Mohamed Sofiene Barka (\"Sofiene\") and his technical work. Give me the depth — systems, architecture, and the trade-offs he made.",
    curious:   "I just want to get to know Mohamed Sofiene Barka (\"Sofiene\") — who he is, what he cares about, and the things he's built."
  };

  function buildPrompt(key) {
    return OPENERS[key] + "\n\n" +
      "Read " + SRC + " — his record lives on that page. Answer only from what's there; if something isn't on the page, say so rather than guessing. If your tool searches the web instead of opening it, open the URL directly.";
  }

  var doorView = document.getElementById("door");
  var lightView = document.getElementById("light");
  var statusEl = document.getElementById("status");

  function show(view) {
    doorView.classList.toggle("active", view === "door");
    lightView.classList.toggle("active", view === "light");
    window.scrollTo(0, 0);
  }

  document.getElementById("pick-light").addEventListener("click", function () {
    show("light");
    location.hash = "light";
  });
  document.getElementById("back").addEventListener("click", function () {
    show("door");
    location.hash = "";
  });

  var picks = document.querySelectorAll(".pick");
  picks.forEach(function (btn) {
    btn.addEventListener("click", function () {
      var text = buildPrompt(btn.getAttribute("data-intent"));
      copy(text, function () {
        picks.forEach(function (p) { p.classList.remove("copied"); });
        btn.classList.add("copied");
        setStatus(true, "Copied — paste it into your AI.");
      }, function () {
        setStatus(true, "Press Cmd/Ctrl + C to copy, then paste into your AI.");
      });
    });
  });

  function setStatus(strong, msg) {
    statusEl.innerHTML = strong ? "<strong>" + msg + "</strong>" : msg;
    statusEl.classList.add("show");
  }

  function copy(text, ok, fail) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(ok, function () { legacy(text, ok, fail); });
    } else {
      legacy(text, ok, fail);
    }
  }
  function legacy(text, ok, fail) {
    var ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    var done = false;
    try { done = document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
    (done ? ok : fail)();
  }

  if (location.hash === "#light") show("light");
</script>
</body>
</html>
